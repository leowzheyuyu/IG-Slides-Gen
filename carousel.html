<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1; /* Your Brand Color */
            --light-bg: #F8FAFC;
            --dark-bg: #0F172A;
            --text-dark: #0F172A;
            --text-light: #F8FAFC;
        }
        body { margin: 0; padding: 0; background: #ccc; font-family: 'Plus Jakarta Sans', sans-serif; }
        .ig-frame { width: 420px; height: 525px; background: white; position: relative; overflow: hidden; margin: 20px auto; }
        .carousel-track { display: flex; transition: transform 0.3s ease; height: 100%; width: 2940px; /* 420 * 7 slides */ }
        .slide { width: 420px; height: 525px; flex-shrink: 0; position: relative; padding: 36px; box-sizing: border-box; display: flex; flex-direction: column; }
        
        /* Layout Types */
        .light { background: var(--light-bg); color: var(--text-dark); }
        .dark { background: var(--dark-bg); color: var(--text-light); }
        .hero { justify-content: center; align-items: center; text-align: center; }
        
        h1 { font-size: 32px; font-weight: 700; line-height: 1.1; margin: 0 0 16px 0; }
        p { font-size: 14px; line-height: 1.5; margin: 0; }

        /* Progress Bar UI */
        .progress-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 28px 20px; display: flex; align-items: center; gap: 10px; }
        .track { flex: 1; height: 3px; background: rgba(0,0,0,0.1); border-radius: 2px; }
        .fill { height: 100%; background: var(--primary); border-radius: 2px; }
    </style>
</head>
<body>
    <div class="ig-frame">
        <div class="carousel-track">
            <!-- Slide 1: Hero -->
            <div class="slide light hero">
                <h1>AI Automation for Web Devs</h1>
                <p>Scaling your agency with n8n.</p>
                <div class="progress-container"><div class="track"><div class="fill" style="width: 14%"></div></div><span>1/7</span></div>
            </div>
            <!-- Add more slides here following the pattern -->
        </div>
    </div>
</body>
</html>
